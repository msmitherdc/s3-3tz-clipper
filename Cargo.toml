[package]
name = "s3-3tz-clipper"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full", "fs"] }
tokio-util = { version = "0.7", features = ["compat"] }
clap = { version = "4.4", features = ["derive"] }
aws-config = "1.1"
aws-sdk-s3 = "1.1"
async_zip = { version = "0.0.17", features = ["tokio", "deflate"] }
geojson = "0.24"
geo = "0.27"
geo-types = "0.7"
serde_json = "1.0"
futures = "0.3"
indicatif = "0.17"
s2 = "0.0.10"
md-5 = "0.10"       # <-- Added for 3tz Hash
byteorder = "1.5"   # <-- Added for 3tz Little Endian Parsing
crc32fast = "1.3"   # <-- Added for ZIP CRC patching
flate2 = "1.0" # <-- Added for high-performance multi-core decompression
zip = "0.6" #