name: Publish Rust Release Binaries

on:
  release:
    types: [published] # Triggers when you create and publish a release on GitHub

permissions:
  contents: write # Required to upload assets to the release page

jobs:
  build-and-upload:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # --- Linux Builds ---
          # 1. Glibc build using zigbuild for RHEL 8+ compatibility
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu.2.28 # Zigbuild target
            artifact_name: s3-3tz-clipper
            asset_name: s3-3tz-clipper-linux-amd64-glibc.tar.gz
            use_zig: true # Custom flag to enable zigbuild step

          # 2. Musl build for a fully static binary
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl # Musl target
            artifact_name: s3-3tz-clipper
            asset_name: s3-3tz-clipper-linux-amd64-musl.tar.gz
            use_zig: false # Regular build

          # --- Other OS ---
          # macOS Apple Silicon (M1/M2/M3/M4)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: s3-3tz-clipper
            asset_name: s3-3tz-clipper-macos-arm64.tar.gz
            use_zig: false

          # Windows Intel/AMD 64-bit
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: s3-3tz-clipper.exe
            asset_name: s3-3tz-clipper-windows-amd64.zip
            use_zig: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # This target is now derived from the matrix.target by stripping the zig suffix
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ split(matrix.target, '.')[0] }}

      # Install musl-tools only when the target contains 'musl'
      - name: Install musl-tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Install ziglang tools only when the custom 'use_zig' flag is true
      - name: Install zig and cargo-zigbuild
        if: matrix.use_zig
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Build with zigbuild for the glibc target, otherwise use standard cargo build
      - name: Build Binary
        run: |
          if [[ "${{ matrix.use_zig }}" == "true" ]]; then
            cargo zigbuild --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package Binary
        shell: bash
        run: |
          # The output directory is the full target string from the matrix
          cd target/${{ matrix.target }}/release
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a ../../../${{ matrix.asset_name }} ${{ matrix.artifact_name }}
          else
            tar -czf ../../../${{ matrix.asset_name }} ${{ matrix.artifact_name }}
          fi
          cd ../../../

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
