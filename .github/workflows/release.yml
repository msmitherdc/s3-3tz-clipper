name: Publish Rust Release Binaries

on:
  release:
    types: [published] # Triggers when you create and publish a release on GitHub

permissions:
  contents: write # Required to upload assets to the release page

jobs:
  build-and-upload:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux AMD64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: s3-3tz-clipper
            asset_name: s3-3tz-clipper-linux-amd64.tar.gz

          # macOS Apple Silicon (M1/M2/M3/M4)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: s3-3tz-clipper
            asset_name: s3-3tz-clipper-macos-arm64.tar.gz

          # Windows Intel/AMD 64-bit
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: s3-3tz-clipper.exe
            asset_name: s3-3tz-clipper-windows-amd64.zip

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.target }}

    - name: Build Binary
      run: cargo build --release --target ${{ matrix.target }}

    # Cross-platform packaging step
    - name: Package Binary
      shell: bash
      run: |
        cd target/${{ matrix.target }}/release
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          7z a ../../../${{ matrix.asset_name }} ${{ matrix.artifact_name }}
        else
          tar -czf ../../../${{ matrix.asset_name }} ${{ matrix.artifact_name }}
        fi
        cd ../../../

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.asset_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}