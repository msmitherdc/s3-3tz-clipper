name: Publish Rust Release Binaries

on:
  release:
    types: [published] # Triggers when you create and publish a release on GitHub
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Target release tag to compile and upload binaries'
        required: true
permissions:
  contents: write # Required to upload assets to the release page

jobs:
  build-and-upload:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # --- Linux Builds ---
          - os: ubuntu-latest
            rustup_target: x86_64-unknown-linux-gnu
            build_target: x86_64-unknown-linux-gnu.2.28
            artifact_name: s3-3tz-clipper
            asset_name: s3-3tz-clipper-linux-amd64-glibc.tar.gz

          - os: ubuntu-latest
            rustup_target: x86_64-unknown-linux-musl
            build_target: x86_64-unknown-linux-musl
            artifact_name: s3-3tz-clipper
            asset_name: s3-3tz-clipper-linux-amd64-musl.tar.gz

          # --- Other OS ---
          - os: macos-latest
            rustup_target: aarch64-apple-darwin
            build_target: aarch64-apple-darwin
            artifact_name: s3-3tz-clipper
            asset_name: s3-3tz-clipper-macos-arm64.tar.gz

          - os: windows-latest
            rustup_target: x86_64-pc-windows-msvc
            build_target: x86_64-pc-windows-msvc
            artifact_name: s3-3tz-clipper.exe
            asset_name: s3-3tz-clipper-windows-amd64.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustup_target }}

      - name: Install musl-tools
        if: contains(matrix.build_target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install zig and cargo-zigbuild
        if: contains(matrix.build_target, '.2.28')
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.build_target }}

      - name: Build Binary
        shell: bash
        run: |
          if [[ "${{ contains(matrix.build_target, '.2.28') }}" == "true" ]]; then
            cargo zigbuild --release --target ${{ matrix.build_target }}
          else
            cargo build --release --target ${{ matrix.build_target }}
          fi

      - name: Package Binary
        shell: bash
        run: |
          cd target/${{ matrix.build_target }}/release
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a ../../../${{ matrix.asset_name }} ${{ matrix.artifact_name }}
          else
            tar -czf ../../../${{ matrix.asset_name }} ${{ matrix.artifact_name }}
          fi
          cd ../../../

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
